<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fluxo Essencial</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <h1>Fluxo Essencial</h1>
        <p class="subtitle">Foco e fluxo diário · <span id="current-board-name">Board</span></p>
      </div>
      <div class="topbar-actions">
        <button id="board-menu-toggle" type="button" class="new-board-btn" aria-label="Boards">+</button>
      <button id="theme-toggle" type="button" class="theme-btn" aria-label="Alternar tema" aria-pressed="false">
        <span id="theme-icon" class="material-symbols-outlined">dark_mode</span>
      </button>
      </div>
    </header>

    <div id="board-menu-overlay" class="board-menu-overlay" hidden>
      <div class="board-menu" role="dialog" aria-label="Boards">
        <div class="board-menu-head">
          <h3>Boards</h3>
          <button id="close-board-menu-btn" type="button" class="close-board-menu-btn" aria-label="Fechar boards">×</button>
        </div>
        <div id="board-list" class="board-list"></div>
        <div id="board-inline-slot" class="board-inline-slot"></div>
        <p id="board-menu-message" class="board-menu-message" aria-live="polite"></p>
        <button id="add-board-btn" type="button" class="add-board-btn">+ New board</button>
      </div>
    </div>

    <form id="task-form" class="task-form" autocomplete="off">
      <input id="task-title" name="title" type="text" placeholder="Nova tarefa" required maxlength="120" />
      <input id="task-description" name="description" type="text" placeholder="Categoria (opcional)" maxlength="240" />
      <button type="submit">Adicionar</button>
    </form>

    <section class="board" aria-label="Fluxo Essencial">
      <article class="column" data-column="todo">
        <h2>Próximos</h2>
        <div class="task-list" id="todo-list"></div>
      </article>

      <article class="column" data-column="inprogress">
        <h2>Em andamento</h2>
        <div class="task-list" id="inprogress-list"></div>
      </article>

      <article class="column" data-column="done">
        <h2>Concluído</h2>
        <div class="task-list" id="done-list"></div>
      </article>
    </section>
  </main>

  <div class="focus-wrap">
    <button id="focus-toggle" type="button" class="focus-btn" aria-pressed="false">
      <span class="dot"></span>
      <span id="focus-label">Modo Foco</span>
    </button>
  </div>

  <script src="script.js"></script>
</body>
</html>
