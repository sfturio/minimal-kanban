<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fluxo Essencial</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <h1>Fluxo Essencial</h1>
        <p class="subtitle">Foco e fluxo diário · <span id="board-name">Principal</span></p>
      </div>
      <div class="header-actions">
        <button id="board-toggle" type="button" class="theme-btn" aria-label="Boards" aria-expanded="false">+</button>
        <button id="theme-toggle" type="button" class="theme-btn" aria-label="Alternar tema" aria-pressed="false">
          <span id="theme-icon" class="material-symbols-outlined">dark_mode</span>
        </button>
      </div>
    </header>

    <form id="task-form" class="task-form" autocomplete="off">
      <input id="task-title" name="title" type="text" placeholder="Nova tarefa" required maxlength="120" />
      <input id="task-description" name="description" type="text" placeholder="Categoria (opcional)" maxlength="240" />
      <button type="submit">Adicionar</button>
      <button id="ia-generate-btn" type="button">Planejar</button>
    </form>

    <section class="board" aria-label="Fluxo Essencial">
      <article class="column" data-column="todo">
        <h2>Próximos</h2>
        <div class="task-list" id="todo-list"></div>
      </article>

      <article class="column" data-column="inprogress">
        <h2>Em andamento</h2>
        <div class="task-list" id="inprogress-list"></div>
      </article>

      <article class="column" data-column="done">
        <h2>Concluído</h2>
        <div class="task-list" id="done-list"></div>
      </article>
    </section>
  </main>

  <div class="focus-wrap">
    <button id="focus-toggle" type="button" class="focus-btn" aria-pressed="false">
      <span class="dot"></span>
      <span id="focus-label">Modo Foco</span>
    </button>
  </div>

  <div id="ai-modal-overlay" class="modal-overlay" hidden>
    <section class="ai-modal" role="dialog" aria-modal="true" aria-labelledby="ai-modal-title">
      <div class="ai-modal-head">
        <h2 id="ai-modal-title">Planejar com IA</h2>
        <button id="ai-close-btn" type="button" class="icon-close" aria-label="Fechar modal">×</button>
      </div>
      <p>Descreva o que você quer fazer</p>
      <textarea id="ai-plan-input" rows="7" placeholder="Separe tarefas com ; Ex: revisar e-mails ; treino de peito ; estudar JavaScript. Dica: se usar (), vira categoria. Ex: estudar JavaScript (noite)"></textarea>
      <div class="ai-modal-actions">
        <button id="ai-cancel-btn" type="button" class="secondary">Cancelar</button>
        <button id="ai-generate-confirm-btn" type="button" class="primary">Gerar tarefas</button>
      </div>
    </section>
  </div>

  <div id="boards-overlay" class="boards-overlay" hidden>
    <aside class="boards-panel" role="dialog" aria-modal="true" aria-labelledby="boards-title">
      <div class="boards-head">
        <h2 id="boards-title">Boards</h2>
        <button id="boards-close" type="button" class="icon-close" aria-label="Fechar boards">×</button>
      </div>
      <div id="boards-list" class="boards-list"></div>
      <div class="boards-create">
        <input id="new-board-input" type="text" placeholder="Nova board" maxlength="60" />
        <button id="create-board-btn" type="button">+ Nova board</button>
      </div>
    </aside>
  </div>

  <script src="script.js"></script>
</body>
</html>
